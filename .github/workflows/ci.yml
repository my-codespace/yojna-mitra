name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ───────────────────────────────────────
  backend-test:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --testPathPattern="eligibilityEngine"
        env:
          NODE_ENV: test
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          MONGODB_URI: mongodb://localhost:27017/yojana_mitra_test

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          MONGODB_URI: mongodb://localhost:27017/yojana_mitra_test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          flags: backend

  # ─── Frontend build ──────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker build check ───────────────────────────────────
  docker-check:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t yojana-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.frontend -t yojana-frontend:ci ./frontend